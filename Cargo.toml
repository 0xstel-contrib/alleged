[workspace]
members = ["bindings/*"]

[workspace.package]
version = "0.2.0"
authors = ["stel <stel@national.shitposting.agency>"]
edition = "2024"
license = "0BSD"

[workspace.lints.clippy]
cargo = "warn"
nursery = "warn"

[package]
name = "alleged-lib"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
lints.workspace = true

[features]
default = ["regex-lite"]
regex = ["dep:regex"]
regex-lite = ["dep:regex-lite"]

[dependencies]
comrak = { version = "0.53.0", default-features = false }
humantime = "2.4.0"
regex = { version = "1.13.1", optional = true }
regex-lite = { version = "0.1.9", optional = true }
rustc-hash = "2.1.3"
thiserror = "2.0.18"
time = { version = "0.3.53", features = ["formatting", "macros", "parsing"] }
walkdir = "2.5.0"
